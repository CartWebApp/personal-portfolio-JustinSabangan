<!DOCTYPE html>
<html lang="en" data-page="contact">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="site.css">
</head>

<body class="desktop">
    <main class="desktop-area win7">
        <section class="window active win7-window win-contact-main">
            <div class="title-bar">
                <h2 class="title-bar-text">Contact me!</h2>
                <div class="title-bar-controls">
                    <button type="button" aria-label="Minimize"></button>
                    <button type="button" aria-label="Maximize"></button>
                    <button type="button" aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body contact-body">
                <div class="contact-top">
                    <img class="contact-icon" src="imgs/contact.png" width="92" height="92" alt="">
                    <div class="contact-bubble">
                        <p>Hey there! Want to learn more about me or what I do? Fill out the form below and click
                            Submit — it will open your email app with a message to
                            <a href="mailto:justin09ayala@gmail.com">justin09ayala@gmail.com</a>. I’ll get back to you as
                            soon as I can. Thanks for your interest!</p>
                    </div>
                </div>

                <form class="contact-form">
                    <label class="contact-field">
                        <span class="contact-label">Name:</span>
                        <input type="text" name="name" autocomplete="name" required>
                    </label>

                    <label class="contact-field">
                        <span class="contact-label">Email:</span>
                        <input type="email" name="email" autocomplete="email" required>
                    </label>

                    <label class="contact-field contact-field--message">
                        <span class="contact-label">Message:</span>
                        <textarea name="message" required></textarea>
                    </label>

                    <div class="contact-actions">
                        <button class="contact-submit" type="submit">Submit</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <nav class="taskbar">
        <div class="taskbar-start">
            <button type="button" class="taskbar-start-btn" aria-label="Start">
                <img src="imgs/start.png" class="taskbar-orb" width="38" height="38" alt="" decoding="async">
            </button>
        </div>
        <div class="taskbar-quick">
            <a class="taskbar-pin" href="home.html" title="Home">
                <img src="imgs/world.png" width="24" height="24" alt="">
            </a>
            <a class="taskbar-pin" href="aboutme.html" title="About Me">
                <img src="imgs/avatar.png" width="24" height="24" alt="">
            </a>
            <a class="taskbar-pin" href="programming.html" title="Programming">
                <img src="imgs/computadora.png" width="24" height="24" alt="">
            </a>
            <a class="taskbar-pin" href="writing.html" title="Writing">
                <img src="imgs/write.png" width="24" height="24" alt="">
            </a>
            <a class="taskbar-pin" href="resume.html" title="Resume">
                <img src="imgs/resume.png" width="24" height="24" alt="Resume">
            </a>
            <a class="taskbar-pin" href="contact.html" title="Contact">
                <img src="imgs/connection.png" width="24" height="24" alt="">
            </a>
        </div>
        <div class="taskbar-spacer"></div>
        <div class="taskbar-tray">
            <div class="taskbar-tray-glyphs">
                <span class="taskbar-tray-icon">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                </span>
                <span class="taskbar-tray-icon">
                    <img src="imgs/speaker.png" width="14" height="14" alt="Speaker">
                </span>
                <span class="taskbar-tray-icon">
                    <img src="imgs/wifi.png" width="14" height="14" alt="Wi-Fi">
                </span>
                <span class="taskbar-tray-icon">
                    <img src="imgs/battery.png" width="14" height="14" alt="Battery">
                </span>
            </div>
            <div class="taskbar-clock">
                <time id="taskbar-time" datetime="">
                    <span class="taskbar-clock-time"></span>
                    <span class="taskbar-clock-date"></span>
                </time>
            </div>
        </div>
        <button type="button" class="show-desktop" aria-label="Show desktop"></button>
    </nav>

    <script src="button-ding.js"></script>
    <script src="contact-form.js"></script>
    <script src="draggable-windows.js"></script>
    <script src="bubbles.js" defer></script>
    <script src="page-bgm.js" data-src="audio/music/Rafflesia%20Online%204.mp3" defer></script>
    <script src="taskbar-clock.js"></script>
    <script src="notification.js" defer></script>

</body>

</html>
